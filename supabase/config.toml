# =====================================================
# SwiftwapdriveSync - Supabase Edge Functions Config
# =====================================================

[api]
enabled = true

# =====================================================
# Edge Functions Configuration
# =====================================================

# WhatsApp Webhook - Público (recebe webhooks do Meta)
[functions.whatsapp-webhook]
verify_jwt = false

# Process Media - Interno (chamado pelo webhook)
[functions.process-media]
verify_jwt = false

# WhatsApp Test Connection - Autenticado (testa credenciais na Meta)
[functions.whatsapp-test-connection]
verify_jwt = true

# WhatsApp Verify Status - Autenticado (valida credenciais salvas e atualiza status)
[functions.whatsapp-verify-status]
verify_jwt = true

# Reprocess Media - Autenticado (reprocessa arquivo pending/failed)
[functions.reprocess-media]
verify_jwt = true

# Google OAuth - Requer autenticação
[functions.google-oauth]
verify_jwt = false

# WhatsApp Embedded Signup - Autenticado (troca code por token, registra webhook)
[functions.whatsapp-embedded-signup]
verify_jwt = false

# Health Check - Autenticado (verifica saúde das integrações)
[functions.health-check]
verify_jwt = false

# Send Health Alert - Interno (envia email via Resend)
[functions.send-health-alert]
verify_jwt = false
